<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
<title>404 — NOCTIS</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"><link rel="stylesheet" href="fonts/inter.css">
<link rel="stylesheet" href="style.css">
<style>
  body {
    justify-content: center;
    padding: 40px 20px; overflow: hidden;
  }
  body::before {
    content: '404';
    top: 50%; left: 50%; bottom: auto;
    transform: translate(-50%, -50%);
    font-size: 280px;
    letter-spacing: -10px;
  }

  .content {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    text-align: center;
    opacity: 0; animation: fadeUp 0.5s ease 0.1s forwards;
  }

  .glitch {
    font-size: 64px; font-weight: 900; color: var(--text-primary);
    letter-spacing: -3px;
  }

  .message {
    font-size: 13px; font-weight: 300; color: var(--text-secondary);
    line-height: 1.7; max-width: 320px;
  }

  .divider {
    width: 32px; height: 0.5px; background: var(--text-muted);
    margin: 8px 0;
  }

  .home-link {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 24px;
    background: var(--card-bg); border: 0.5px solid var(--card-border);
    border-radius: 4px; text-decoration: none;
    font-size: 11px; font-weight: 500; color: var(--text-primary);
    letter-spacing: 0.06em; text-transform: uppercase;
    transition: all 0.18s;
  }
  .home-link:hover {
    background: var(--text-primary); color: var(--bg);
    border-color: var(--text-primary);
    transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  }
  .home-link svg {
    width: 14px; height: 14px; stroke: currentColor; fill: none;
    stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
  }

  .footer-noctis {
    margin-top: 40px;
    font-size: 10px; font-weight: 900; color: var(--text-muted);
    letter-spacing: 0.2em; text-transform: uppercase;
  }
</style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to content</a>

<main class="content" id="main-content" tabindex="-1">
  <div class="glitch">404</div>
  <div class="message" data-i18n="404.message">
    The page you're looking for doesn't exist or has been moved.
  </div>
  <div class="divider"></div>
  <a href="/" class="home-link">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    <span data-i18n="404.back">Back to home</span>
  </a>
  <div class="footer-noctis">NOCTIS</div>
</main>

<script src="js/i18n.js" defer></script>
<script src="js/theme.js" defer></script>

</body>
</html>
