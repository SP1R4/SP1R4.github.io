<style>
  /* ── SECTION LABEL override ── */
  .section-label { margin-top: 32px; }
  .section-label:first-of-type { margin-top: 0; }

  /* ── FEATURED ── */
  .featured { display: flex; flex-direction: column; gap: 12px; margin-bottom: 8px; }
  .featured-badge {
    font-size: 8px; padding: 2px 7px; border-radius: 2px;
    background: var(--accent); color: #fff; letter-spacing: 0.06em;
    font-weight: 600; text-transform: uppercase; margin-left: auto; flex-shrink: 0;
  }
  .project-card:hover .featured-badge { background: rgba(198,61,31,0.45); color: var(--bg); }

  /* ── PROJECTS GRID ── */
  .projects { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 560px) { .projects { grid-template-columns: 1fr; } }

  .project-card {
    display: flex; flex-direction: column; padding: 20px;
    background: var(--card-bg); border: 0.5px solid var(--card-border);
    border-radius: 4px; text-decoration: none;
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.18s, border-color 0.18s;
    opacity: 0; animation: fadeUp 0.4s ease calc(var(--i, 0) * 0.06s + 0.2s) forwards;
  }
  .project-card:hover {
    background: var(--text-primary); border-color: var(--text-primary);
    transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }
  .project-card:hover .proj-name { color: var(--bg); }
  .project-card:hover .proj-desc { color: var(--text-secondary); }
  .project-card:hover .proj-meta { color: var(--text-secondary); }
  .project-card:hover .proj-lang-dot { box-shadow: 0 0 6px currentColor; }
  .project-card:hover .proj-tag { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }

  .proj-name {
    font-size: 14px; font-weight: 600; color: var(--text-primary);
    margin-bottom: 8px; transition: color 0.18s;
    display: flex; align-items: center; gap: 8px;
  }
  .proj-name svg { width: 15px; height: 15px; stroke: var(--icon-stroke); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; transition: stroke 0.18s; }
  .project-card:hover .proj-name svg { stroke: var(--bg); }

  .proj-desc {
    font-size: 12px; font-weight: 300; color: var(--text-secondary);
    line-height: 1.6; flex: 1; margin-bottom: 14px; transition: color 0.18s;
  }

  .proj-meta {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    font-size: 10px; color: var(--text-muted); transition: color 0.18s;
  }
  .proj-stat { display: flex; align-items: center; gap: 4px; }
  .proj-stat svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .proj-lang { display: flex; align-items: center; gap: 5px; }
  .proj-lang-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: box-shadow 0.18s; }

  .loading {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted); font-size: 12px; font-weight: 300;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
</style>
