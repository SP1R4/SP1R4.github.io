<style>
  /* ── POST LIST ── */
  .post-list { display: flex; flex-direction: column; gap: 12px; }

  .post-card {
    display: block; padding: 20px 22px; background: var(--card-bg);
    border: 0.5px solid var(--card-border); border-radius: 4px;
    text-decoration: none; cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.18s, border-color 0.18s;
    opacity: 0; animation: fadeUp 0.4s ease calc(var(--i, 0) * 0.07s + 0.2s) forwards;
  }
  .post-card:hover {
    background: var(--text-primary); border-color: var(--text-primary);
    transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }
  .post-card:hover .post-title { color: var(--bg); }
  .post-card:hover .post-desc { color: var(--text-secondary); }
  .post-card:hover .post-meta { color: var(--text-secondary); }
  .post-card:hover .post-tag { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }

  .post-title {
    font-size: 15px; font-weight: 600; color: var(--text-primary);
    margin-bottom: 6px; transition: color 0.18s;
  }
  .post-desc {
    font-size: 12px; font-weight: 300; color: var(--text-secondary);
    line-height: 1.6; margin-bottom: 10px; transition: color 0.18s;
  }
  .post-meta {
    display: flex; align-items: center; gap: 10px;
    font-size: 10px; color: var(--text-muted); transition: color 0.18s;
  }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted); font-size: 13px; font-weight: 300;
  }

  /* ── CATEGORY FILTER ── */
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px;
    opacity: 0; animation: fadeUp 0.4s ease 0.15s forwards;
  }
  .filter-pill {
    padding: 5px 14px; border-radius: 3px; cursor: pointer;
    font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
    text-transform: uppercase; border: 1px solid var(--card-border);
    background: transparent; color: var(--text-muted);
    transition: all 0.15s; font-family: 'Inter', sans-serif;
  }
  .filter-pill:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
  .filter-pill.active {
    background: var(--text-primary); color: var(--bg);
    border-color: var(--text-primary);
  }
  .post-count {
    font-size: 10px; color: var(--text-muted); margin-bottom: 16px;
    opacity: 0; animation: fadeUp 0.4s ease 0.18s forwards;
  }
  .post-reading {
    padding: 2px 8px; border-radius: 2px;
    background: var(--icon-bg); border: 0.5px solid var(--icon-border);
    color: var(--text-muted);
  }

  /* ── SEARCH ── */
  .post-search {
    width: 100%; padding: 10px 14px; margin-bottom: 14px;
    background: var(--card-bg); border: 0.5px solid var(--card-border);
    border-radius: 4px; color: var(--text-primary);
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400;
    outline: none; transition: border-color 0.15s, background 0.15s;
    opacity: 0; animation: fadeUp 0.4s ease 0.12s forwards;
  }
  .post-search::placeholder { color: var(--text-muted); }
  .post-search:focus { border-color: var(--text-secondary); }
</style>
</head>
<body class="has-nav">

<main class="container" id="main-content" tabindex="-1">

  <div class="filter-bar" id="filter-bar"></div>
  <div class="post-count" id="post-count"></div>
  <div class="post-list" id="post-list"></div>
  <noscript>
    <div class="empty-state" style="margin-top:24px;">
      JavaScript is required to view the post list. The site degrades gracefully — links to writeups still work directly.
    </div>
  </noscript>

  <footer class="site-footer">

    <div class="site-footer-sub" data-i18n="services.footer.sub">Cybersecurity &amp; IT Consulting</div>
  </footer>
</main>
