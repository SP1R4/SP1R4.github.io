<style>
  /* ── POST LIST ── */
  .post-list { display: flex; flex-direction: column; gap: 12px; }

  .post-card {
    display: block; padding: 20px 22px; background: var(--card-bg);
    border: 0.5px solid var(--card-border); border-radius: 4px;
    text-decoration: none; cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.18s, border-color 0.18s;
    opacity: 0; animation: fadeUp 0.4s ease calc(var(--i, 0) * 0.07s + 0.2s) forwards;
  }
  .post-card:hover {
    background: var(--text-primary); border-color: var(--text-primary);
    transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }
  .post-card:hover .post-title { color: var(--bg); }
  .post-card:hover .post-desc { color: var(--text-secondary); }
  .post-card:hover .post-meta { color: var(--text-secondary); }
  .post-card:hover .post-tag { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }

  .post-title {
    font-size: 15px; font-weight: 600; color: var(--text-primary);
    margin-bottom: 6px; transition: color 0.18s;
  }
  .post-desc {
    font-size: 12px; font-weight: 300; color: var(--text-secondary);
    line-height: 1.6; margin-bottom: 10px; transition: color 0.18s;
  }
  .post-meta {
    display: flex; align-items: center; gap: 10px;
    font-size: 10px; color: var(--text-muted); transition: color 0.18s;
  }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted); font-size: 13px; font-weight: 300;
  }

  /* ── CATEGORY FILTER ── */
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px;
    opacity: 0; animation: fadeUp 0.4s ease 0.15s forwards;
  }
  .filter-pill {
    padding: 5px 14px; border-radius: 3px; cursor: pointer;
    font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
    text-transform: uppercase; border: 1px solid var(--card-border);
    background: transparent; color: var(--text-muted);
    transition: all 0.15s; font-family: 'Inter', sans-serif;
  }
  .filter-pill:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
  .filter-pill.active {
    background: var(--text-primary); color: var(--bg);
    border-color: var(--text-primary);
  }
  .post-count {
    font-size: 10px; color: var(--text-muted); margin-bottom: 16px;
    opacity: 0; animation: fadeUp 0.4s ease 0.18s forwards;
  }

  /* ── POST VIEW ── */
  .post-view { display: none; }
  .post-view.active { display: block; }

  .post-view-header {
    margin-bottom: 32px; padding-bottom: 24px;
    border-bottom: 0.5px solid var(--divider);
    opacity: 0; animation: fadeUp 0.4s ease 0.1s forwards;
  }
  .post-view-title {
    font-size: 26px; font-weight: 900; color: var(--text-primary);
    letter-spacing: -0.5px; line-height: 1.3; margin-bottom: 10px;
  }
  .post-view-meta {
    display: flex; align-items: center; gap: 12px;
    font-size: 11px; color: var(--text-muted);
  }

  .post-back {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-muted); text-decoration: none;
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 24px; transition: color 0.15s;
    opacity: 0; animation: fadeUp 0.4s ease 0.05s forwards;
  }
  .post-back:hover { color: var(--text-primary); }

  /* ── MARKDOWN CONTENT ── */
  .md-content {
    opacity: 0; animation: fadeUp 0.4s ease 0.15s forwards;
  }
  .md-content h1 { font-size: 24px; font-weight: 800; color: var(--text-primary); margin: 32px 0 16px; letter-spacing: -0.3px; }
  .md-content h2 { font-size: 19px; font-weight: 700; color: var(--text-primary); margin: 28px 0 12px; letter-spacing: -0.2px; }
  .md-content h3 { font-size: 15px; font-weight: 600; color: var(--text-primary); margin: 24px 0 10px; }
  .md-content p { font-size: 14px; font-weight: 300; color: var(--text-secondary); line-height: 1.8; margin-bottom: 16px; }
  .md-content a { color: var(--link-color); text-decoration: underline; text-underline-offset: 2px; }
  .md-content strong { font-weight: 600; color: var(--text-primary); }
  .md-content em { font-style: italic; }
  .md-content ul, .md-content ol { margin: 0 0 16px 20px; font-size: 14px; font-weight: 300; color: var(--text-secondary); line-height: 1.8; }
  .md-content li { margin-bottom: 4px; }
  .md-content hr { border: none; height: 0.5px; background: var(--divider); margin: 32px 0; }
  .md-content img { max-width: 100%; border-radius: 4px; margin: 16px 0; }

  .md-content blockquote {
    border-left: 3px solid var(--blockquote-border);
    background: var(--blockquote-bg);
    padding: 12px 18px; margin: 16px 0; border-radius: 0 4px 4px 0;
  }
  .md-content blockquote p { margin-bottom: 0; }

  .md-content code {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    background: var(--inline-code-bg); padding: 2px 6px; border-radius: 3px;
  }
  .md-content pre {
    background: var(--code-bg); border: 0.5px solid var(--code-border);
    border-radius: 4px; padding: 18px 20px; margin: 16px 0;
    overflow-x: auto; position: relative;
  }
  .md-content pre code {
    background: none; padding: 0; font-size: 12.5px;
    line-height: 1.7; color: var(--text-primary);
  }
</style>

<div class="container">

  <!-- LIST VIEW -->
  <div id="list-view">
    <div class="page-header">
      <div class="page-title">Blog</div>
      <div class="page-subtitle">Research &amp; Writeups</div>
    </div>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="post-count" id="post-count"></div>
    <div class="post-list" id="post-list"></div>
  </div>

  <!-- POST VIEW -->
  <div id="post-view" class="post-view">
    <a href="#" class="post-back" onclick="showList(); return false;">
      &#8592; Back to posts
    </a>
    <div class="post-view-header">
      <div class="post-view-title" id="pv-title"></div>
      <div class="post-view-meta">
        <span id="pv-date"></span>
        <span id="pv-tags"></span>
        <span id="pv-reading-time"></span>
      </div>
    </div>
    <div class="md-content" id="pv-content"></div>
  </div>

</div>

<script>
let posts = [];
let activeFilter = null;

function toggleTheme() {
  document.body.classList.toggle('dark');
  localStorage.setItem('noctis_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}
const savedTheme = localStorage.getItem('noctis_theme');
if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  document.body.classList.add('dark');
}

function formatDate(d) {
  const date = new Date(d + 'T00:00:00');
  return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

function getAllTags() {
  const tags = new Set();
  posts.forEach(p => (p.tags || []).forEach(t => tags.add(t)));
  return [...tags].sort();
}

function renderFilterBar() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '';
  const tags = getAllTags();
  if (tags.length <= 1) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-pill' + (activeFilter === null ? ' active' : '');
  allBtn.textContent = 'All';
  allBtn.onclick = () => { activeFilter = null; renderFilterBar(); renderList(); };
  bar.appendChild(allBtn);

  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'filter-pill' + (activeFilter === tag ? ' active' : '');
    btn.textContent = tag;
    btn.onclick = () => { activeFilter = tag; renderFilterBar(); renderList(); };
    bar.appendChild(btn);
  });
}

function renderList() {
  const list = document.getElementById('post-list');
  const countEl = document.getElementById('post-count');
  list.innerHTML = '';
  if (posts.length === 0) {
    list.innerHTML = '<div class="empty-state">No posts yet.</div>';
    countEl.textContent = '';
    return;
  }
  const sorted = [...posts]
    .filter(p => !activeFilter || (p.tags && p.tags.includes(activeFilter)))
    .sort((a, b) => b.date.localeCompare(a.date));

  countEl.textContent = sorted.length + ' post' + (sorted.length !== 1 ? 's' : '') + (activeFilter ? ' in "' + activeFilter + '"' : '');

  if (sorted.length === 0) {
    list.innerHTML = '<div class="empty-state">No posts in this category.</div>';
    return;
  }

  sorted.forEach((post, i) => {
    const el = document.createElement('a');
    el.className = 'post-card';
    el.href = '#' + post.slug;
    el.style.setProperty('--i', i);
    el.onclick = (e) => { e.preventDefault(); showPost(post.slug); };

    const title = document.createElement('div');
    title.className = 'post-title';
    title.textContent = post.title;

    const desc = document.createElement('div');
    desc.className = 'post-desc';
    desc.textContent = post.description;

    const meta = document.createElement('div');
    meta.className = 'post-meta';
    const date = document.createElement('span');
    date.textContent = formatDate(post.date);
    meta.appendChild(date);
    if (post.tags) {
      post.tags.forEach(t => {
        const tag = document.createElement('span');
        tag.className = 'post-tag';
        tag.textContent = t;
        meta.appendChild(tag);
      });
    }

    el.appendChild(title);
    el.appendChild(desc);
    el.appendChild(meta);
    list.appendChild(el);
  });
}

async function showPost(slug) {
  if (!slug || !/^[a-zA-Z0-9_-]+$/.test(slug)) return;
  const post = posts.find(p => p.slug === slug);
  if (!post) return;

  try {
    const r = await fetch('posts/' + slug + '.md');
    if (!r.ok) throw new Error('Not found');
    const md = await r.text();

    document.getElementById('pv-title').textContent = post.title;
    document.getElementById('pv-date').textContent = formatDate(post.date);

    const tagsEl = document.getElementById('pv-tags');
    tagsEl.innerHTML = '';
    if (post.tags) {
      post.tags.forEach(t => {
        const tag = document.createElement('span');
        tag.className = 'post-tag';
        tag.textContent = t;
        tagsEl.appendChild(tag);
      });
    }

    const words = md.replace(/```[\s\S]*?```/g, '').replace(/[#*`>\-\[\]()!]/g, '').split(/\s+/).filter(Boolean).length;
    const minutes = Math.max(1, Math.round(words / 200));
    document.getElementById('pv-reading-time').textContent = minutes + ' min read';

    document.getElementById('pv-content').innerHTML = DOMPurify.sanitize(marked.parse(md));

    document.getElementById('list-view').style.display = 'none';
    document.getElementById('post-view').classList.add('active');
    window.scrollTo(0, 0);
    history.pushState(null, '', '#' + slug);
  } catch {
    alert('Could not load post.');
  }
}

function showList() {
  document.getElementById('post-view').classList.remove('active');
  document.getElementById('list-view').style.display = 'block';
  history.pushState(null, '', 'blog.html');
}

window.addEventListener('popstate', () => {
  const hash = location.hash.slice(1);
  if (hash) showPost(hash);
  else showList();
});

fetch('posts.json')
  .then(r => r.json())
  .then(data => {
    posts = data;
    renderFilterBar();
    renderList();
    const hash = location.hash.slice(1);
    if (hash) showPost(hash);
  });
</script>
