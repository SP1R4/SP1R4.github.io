<style>
  /* ── POST LIST ── */
  .post-list { display: flex; flex-direction: column; gap: 12px; }

  .post-card {
    display: block; padding: 20px 22px; background: var(--card-bg);
    border: 0.5px solid var(--card-border); border-radius: 4px;
    text-decoration: none; cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.18s, border-color 0.18s;
    opacity: 0; animation: fadeUp 0.4s ease calc(var(--i, 0) * 0.07s + 0.2s) forwards;
  }
  .post-card:hover {
    background: var(--text-primary); border-color: var(--text-primary);
    transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }
  .post-card:hover .post-title { color: var(--bg); }
  .post-card:hover .post-desc { color: var(--text-secondary); }
  .post-card:hover .post-meta { color: var(--text-secondary); }
  .post-card:hover .post-tag { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }

  .post-title {
    font-size: 15px; font-weight: 600; color: var(--text-primary);
    margin-bottom: 6px; transition: color 0.18s;
  }
  .post-desc {
    font-size: 12px; font-weight: 300; color: var(--text-secondary);
    line-height: 1.6; margin-bottom: 10px; transition: color 0.18s;
  }
  .post-meta {
    display: flex; align-items: center; gap: 10px;
    font-size: 10px; color: var(--text-muted); transition: color 0.18s;
  }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted); font-size: 13px; font-weight: 300;
  }

  /* ── CATEGORY FILTER ── */
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px;
    opacity: 0; animation: fadeUp 0.4s ease 0.15s forwards;
  }
  .filter-pill {
    padding: 5px 14px; border-radius: 3px; cursor: pointer;
    font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
    text-transform: uppercase; border: 1px solid var(--card-border);
    background: transparent; color: var(--text-muted);
    transition: all 0.15s; font-family: 'Inter', sans-serif;
  }
  .filter-pill:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
  .filter-pill.active {
    background: var(--text-primary); color: var(--bg);
    border-color: var(--text-primary);
  }
  .post-count {
    font-size: 10px; color: var(--text-muted); margin-bottom: 16px;
    opacity: 0; animation: fadeUp 0.4s ease 0.18s forwards;
  }
</style>

    <div class="site-footer-brand">NOCTIS</div>
    <div class="site-footer-sub">Cybersecurity &amp; IT Consulting</div>
  </footer>
</main>

<script>
let posts = [];
let activeFilter = null;

function toggleTheme() {
  document.body.classList.toggle('dark');
  localStorage.setItem('noctis_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}
const savedTheme = localStorage.getItem('noctis_theme');
if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  document.body.classList.add('dark');
}

function formatDate(d) {
  const date = new Date(d + 'T00:00:00');
  return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

function getAllTags() {
  const tags = new Set();
  posts.forEach(p => (p.tags || []).forEach(t => tags.add(t)));
  return [...tags].sort();
}

function renderFilterBar() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '';
  const tags = getAllTags();
  if (tags.length <= 1) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-pill' + (activeFilter === null ? ' active' : '');
  allBtn.textContent = 'All';
  allBtn.onclick = () => { activeFilter = null; renderFilterBar(); renderList(); };
  bar.appendChild(allBtn);

  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'filter-pill' + (activeFilter === tag ? ' active' : '');
    btn.textContent = tag;
    btn.onclick = () => { activeFilter = tag; renderFilterBar(); renderList(); };
    bar.appendChild(btn);
  });
}

function renderList() {
  const list = document.getElementById('post-list');
  const countEl = document.getElementById('post-count');
  list.innerHTML = '';
  if (posts.length === 0) {
    list.innerHTML = '<div class="empty-state">No posts yet.</div>';
    countEl.textContent = '';
    return;
  }
  const sorted = [...posts]
    .filter(p => !activeFilter || (p.tags && p.tags.includes(activeFilter)))
    .sort((a, b) => b.date.localeCompare(a.date));

  countEl.textContent = sorted.length + ' post' + (sorted.length !== 1 ? 's' : '') + (activeFilter ? ' in "' + activeFilter + '"' : '');

  if (sorted.length === 0) {
    list.innerHTML = '<div class="empty-state">No posts in this category.</div>';
    return;
  }

  sorted.forEach((post, i) => {
    const el = document.createElement('a');
    el.className = 'post-card';
    el.href = post.html;
    el.style.setProperty('--i', i);

    const title = document.createElement('div');
    title.className = 'post-title';
    title.textContent = post.title;

    const desc = document.createElement('div');
    desc.className = 'post-desc';
    desc.textContent = post.description;

    const meta = document.createElement('div');
    meta.className = 'post-meta';
    const date = document.createElement('span');
    date.textContent = formatDate(post.date);
    meta.appendChild(date);
    if (post.tags) {
      post.tags.forEach(t => {
        const tag = document.createElement('span');
        tag.className = 'post-tag';
        tag.textContent = t;
        meta.appendChild(tag);
      });
    }

    el.appendChild(title);
    el.appendChild(desc);
    el.appendChild(meta);
    list.appendChild(el);
  });
}

fetch('posts.json')
  .then(r => r.json())
  .then(data => {
    posts = data;
    renderFilterBar();
    renderList();
  });
</script>
