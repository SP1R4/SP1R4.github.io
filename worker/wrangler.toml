name = "noctis-telegram"
main = "index.js"
compatibility_date = "2024-11-01"

# Lock the endpoint to your site so random origins can't trigger it.
[vars]
ALLOWED_ORIGIN = "https://sp1r4.github.io"

# Secrets are NOT stored here. Set them once after `wrangler login`:
#   wrangler secret put BOT_TOKEN     # paste the @BotFather token
#   wrangler secret put CHAT_ID       # your Telegram numeric chat id
