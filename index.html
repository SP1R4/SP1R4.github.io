<style>
  .container { max-width: 480px; display: flex; flex-direction: column; align-items: center; }
  body { justify-content: flex-start; padding: 48px 20px 48px; }

  /* ── AVATAR ── */
  .avatar-wrap {
    width: 80px; height: 80px; border-radius: 50%;
    overflow: hidden; border: 1.5px solid var(--avatar-border);
    margin-bottom: 16px; background: var(--avatar-bg);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    opacity: 0; transform: scale(0.8);
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards;
  }
  .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-initials { font-size: 22px; font-weight: 900; color: var(--text-primary); letter-spacing: -1px; }

  /* ── TYPOGRAPHY ── */
  .name {
    font-size: 26px; font-weight: 900; color: var(--text-primary);
    letter-spacing: -0.6px; text-align: center; margin-bottom: 6px;
    opacity: 0; animation: fadeUp 0.4s ease 0.2s forwards;
  }
  .brand-tag {
    font-size: 9px; color: var(--text-muted); letter-spacing: 0.24em;
    text-transform: uppercase; margin-bottom: 12px;
    opacity: 0; animation: fadeUp 0.4s ease 0.25s forwards;
  }
  .bio {
    font-size: 11px; font-weight: 300; color: var(--text-secondary);
    text-align: center; line-height: 1.7; max-width: 340px; margin-bottom: 36px;
    opacity: 0; animation: fadeUp 0.4s ease 0.3s forwards;
  }

  /* ── STATUS ── */
  .status {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 28px;
    opacity: 0; animation: fadeUp 0.4s ease 0.32s forwards;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    position: relative; flex-shrink: 0;
  }
  .status-dot::before {
    content: ''; position: absolute; inset: -3px;
    border-radius: 50%; background: inherit;
    opacity: 0; animation: pulse 2s ease-in-out infinite;
  }
  .status-text {
    font-size: 10px; font-weight: 400; color: var(--text-secondary);
    letter-spacing: 0.04em;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 8px; color: var(--label); letter-spacing: 0.22em;
    width: 100%; margin-bottom: 10px;
  }

  /* ── LINKS ── */
  .links { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; perspective: 800px; }

  .link-card {
    width: 100%; display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; background: var(--card-bg);
    border: 0.5px solid var(--card-border); border-radius: 4px;
    text-decoration: none; transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.18s, border-color 0.18s; cursor: pointer;
    position: relative; transform-style: preserve-3d;
    opacity: 0; animation: fadeUp 0.4s ease calc(var(--i, 0) * 0.07s + 0.4s) forwards;
  }
  .link-card:hover {
    background: var(--text-primary); border-color: var(--text-primary);
    transform: translateY(-3px) rotateX(2deg) scale(1.015);
    box-shadow: 0 8px 30px rgba(0,0,0,0.18), 0 0 0 1px rgba(255,255,255,0.05);
  }
  .link-card:hover .link-title { color: var(--bg); }
  .link-card:hover .link-sub { color: var(--text-secondary); }
  .link-card:hover .link-icon { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); }
  .link-card:hover .link-icon svg { stroke: var(--bg); }
  .link-card:hover .link-arrow { color: rgba(255,255,255,0.3); }

  .link-icon {
    width: 36px; height: 36px; border-radius: 3px;
    background: var(--icon-bg); border: 0.5px solid var(--icon-border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.18s;
  }
  .link-icon svg { width: 16px; height: 16px; stroke: var(--icon-stroke); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.18s; }

  .link-text { flex: 1; min-width: 0; }
  .link-title { font-size: 13px; font-weight: 500; color: var(--text-primary); transition: color 0.18s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .link-sub { font-size: 10px; font-weight: 300; color: var(--text-muted); margin-top: 2px; transition: color 0.18s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .link-arrow { font-size: 14px; color: var(--divider); transition: color 0.18s; flex-shrink: 0; }

  /* ── COMBINED CONTACT PILL (Email · Telegram · Viber) ── */
  .link-pill {
    display: flex; align-items: stretch;
    background: var(--card-bg);
    border: 0.5px solid var(--card-border);
    border-radius: 999px;
    overflow: hidden;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.18s;
    opacity: 0; animation: fadeUp 0.4s ease calc(var(--i, 0) * 0.07s + 0.4s) forwards;
  }
  .link-pill:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    border-color: var(--text-primary);
  }
  .link-pill-item {
    flex: 1; display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; padding: 12px 10px;
    text-decoration: none; color: var(--text-primary);
    font-size: 12px; font-weight: 500; letter-spacing: 0.02em;
    border-right: 0.5px solid var(--card-border);
    transition: background 0.15s, color 0.15s;
    min-width: 0;
  }
  .link-pill-item:last-child { border-right: none; }
  .link-pill-item:hover {
    background: var(--text-primary); color: var(--bg);
  }
  .link-pill-item:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .link-pill-icon { display: inline-flex; }
  .link-pill-icon svg {
    width: 14px; height: 14px;
    stroke: currentColor; fill: none; stroke-width: 1.5;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .link-pill-label {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  @media (max-width: 380px) {
    .link-pill-label { display: none; }
    .link-pill-item { padding: 14px 10px; }
  }

  /* ── DIVIDER / FOOTER ── */
  .divider { width: 32px; height: 0.5px; background: var(--divider); margin-bottom: 32px; opacity: 0; animation: fadeUp 0.4s ease 0.75s forwards; }
  .footer-brand { display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0; animation: fadeUp 0.4s ease 0.8s forwards; }
  .footer-noctis { font-size: 18px; font-weight: 900; color: var(--text-primary); letter-spacing: -0.5px; }
  .footer-sub { font-size: 8px; color: var(--footer-sub); letter-spacing: 0.2em; text-transform: uppercase; }
</style>
